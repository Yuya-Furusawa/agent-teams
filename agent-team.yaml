# Sample agent team definition.
# Place this file at the root of the repository you are dispatching tasks from,
# or pass its path via `agent-teams run --team <path>`.
#
# `planner` and each entry in `workers` must match an agent registered in your
# Claude Code installation. Run `claude agents list` to see what's available
# (both built-in agents and sub-agent definitions under ~/.claude/agents/).

name: default-dev-team

# The planner agent decomposes the task and chooses which worker runs each sub-task.
# It is also reused as the summarizer after all workers finish.
#
# NOTE: Prefer an agent whose system prompt does NOT force markdown/narrative output.
# `general-purpose` follows the "emit a JSON block at the end" contract reliably.
# `Plan` (built-in architect) tends to return narrative-only plans and can misbehave.
planner: general-purpose

# Worker roster. The planner can only assign sub-tasks to agents in this list.
workers:
  - Explore
  - general-purpose
  - superpowers:code-reviewer

defaults:
  # model: claude-opus-4-7   # optional, otherwise each agent's default is used
  maxParallel: 3
