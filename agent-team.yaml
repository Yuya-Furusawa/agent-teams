# Sample agent team definition.
# Place this file at the root of the repository you are dispatching tasks from,
# or pass its path via `agent-teams run --team <path>`.
#
# Each worker is one agent by name. The agent must exist as an independent file
# at <agent-teams repo>/agents/<name>.md (or be a Claude Code built-in such as
# general-purpose / Explore / Plan). Multiple agents can share the same `role`
# in their frontmatter — this is how we get three implementers (Kai, Aki, Mika)
# with distinct personalities.

name: default-dev-team

planner: Sage

workers:
  # Implementers — three working styles; the planner picks the right one per
  # sub-task based on each agent's description.
  - Kai     # pragmatic, hands-on, smallest change that ships
  - Aki     # architecture-minded, reads before writing, small incremental PRs
  - Mika    # test-first / TDD discipline

  # One of each of the other roles.
  - Iris    # code reviewer (general correctness / fit)
  - Haru    # maintainability reviewer
  - Vale    # security reviewer
  - Kiri    # simplicity / dead-code reviewer
  - Tess    # test reviewer (strategy + test code quality)
  - Quinn   # QA engineer (authors unit / integration tests)
  - Ren     # researcher
  - Nova    # browser / E2E operator
  - Juno    # systematic debugger
  - Atlas   # DevOps / infra-as-code
  - Lin     # documentation writer

defaults:
  # model: claude-opus-4-7
  maxParallel: 4
